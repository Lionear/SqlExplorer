name: Build

# Two rolling builds, one workflow:
#   schedule    -> builds `develop`, publishes the `nightly` release  (what we are working on)
#   push main   -> builds `main`,    publishes the `preview` release  (what has been merged)
#
# GitHub only fires `schedule` from the default branch, so the nightly cannot live on develop: this
# file has to sit on main and check develop out explicitly. Consequence worth remembering — the nightly
# always runs the workflow *as committed on main*, so workflow edits made on develop only take effect
# once merged. Cron is a hint, not a promise: GitHub delays scheduled runs under load, routinely by
# hours (02:00 UTC has been landing near 05:00).
#
# To pause the nightly, comment out the `schedule` block; `workflow_dispatch` keeps manual runs.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch to build"
        type: choice
        options: [develop, main]
        default: develop
      version:
        description: "Version stamp (leave empty to derive from Directory.Build.props)"
        required: false
        default: ""
      publish_release:
        description: "Also refresh the rolling release for that branch"
        type: boolean
        required: false
        default: false
  schedule:
    - cron: "0 2 * * *"   # nightly (develop) — expect drift, see note above
  push:
    branches: [main]
    tags: ["v*"]       # stable channel: a version tag cuts a real, latest release
    paths-ignore:      # docs / non-code changes shouldn't spend a full build
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
      - ".idea/**"
      - "**/*.DotSettings*"

# Superseded push builds cancel each other; scheduled/dispatch runs keep their own
# lane (event_name in the key) so a push never cancels a nightly or a manual run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Decide once what we are building and where it lands, so the build matrix and the release job can
  # never disagree about it.
  setup:
    name: Resolve target
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.target.outputs.ref }}
      tag: ${{ steps.target.outputs.tag }}
      release_tag: ${{ steps.target.outputs.release_tag }}
      channel: ${{ steps.target.outputs.channel }}
      version: ${{ steps.target.outputs.version }}
    steps:
      # Base checkout only. GitHub fires `schedule`/`push` from the default branch, so this tree is
      # main's regardless of what we build — the base <Version> is fetched from the *target* ref below.
      - uses: actions/checkout@v4

      - name: Resolve ref, channel and version
        id: target
        # Workflow inputs reach bash through env, never through `${{ }}`: GitHub substitutes those
        # textually before the shell parses the line, so an input can close the quote and append
        # commands. Env values are data to bash, whatever they contain.
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          IS_TAG=no
          case "$EVENT_NAME" in
            schedule)          REF=develop ;;
            workflow_dispatch) REF="${INPUT_REF:-develop}" ;;
            push)
              if [ "$REF_TYPE" = tag ]; then REF="$REF_NAME"; IS_TAG=yes; else REF=main; fi ;;
            *)                 REF=main ;;
          esac

          # Both branches and tags become a checkout ref (code execution), so gate hard, not via the UI:
          # branch builds are develop/main only; a tag build must be a v<semver> tag.
          if [ "$IS_TAG" = yes ]; then
            if ! printf '%s' "$REF" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.]+)?$'; then
              echo "Refusing tag ref: $REF" >&2; exit 1
            fi
          else
            case "$REF" in
              develop|main) ;;
              *) echo "Refusing to build unexpected ref: $REF" >&2; exit 1 ;;
            esac
          fi

          # Channel + two tags. TAG carries the rolling update.json manifest (one per channel). RELEASE_TAG
          # is where the build assets land: the v-tag itself for Stable (a real latest release), the rolling
          # tag otherwise.
          if [ "$IS_TAG" = yes ]; then
            CHANNEL=stable;  TAG=stable;  RELEASE_TAG="$REF"
          elif [ "$REF" = main ]; then
            CHANNEL=preview; TAG=preview; RELEASE_TAG=preview
          else
            CHANNEL=nightly; TAG=nightly; RELEASE_TAG=nightly
          fi

          # Version: Stable takes the tag verbatim (v0.2.0 -> 0.2.0); rolling channels stamp the base
          # <Version> with channel.date.run; an explicit dispatch input overrides.
          if [ "$CHANNEL" = stable ]; then
            VERSION="${REF#v}"
          elif [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="$INPUT_VERSION"
          else
            # Read the base <Version> from the branch we actually build, NOT from this checked-out tree
            # (which is the default branch for schedule/push). Without this a nightly building develop
            # stamps main's version — the 0.2.0-vs-0.3.0 drift. REF here is a branch (develop|main).
            git fetch --depth=1 origin "$REF" >/dev/null 2>&1 \
              || { echo "Failed to fetch ref '$REF' for version lookup" >&2; exit 1; }
            BASE=$(git show FETCH_HEAD:Directory.Build.props | sed -n 's|.*<Version>\(.*\)</Version>.*|\1|p')
            if [ -z "$BASE" ]; then echo "No <Version> in Directory.Build.props on '$REF'" >&2; exit 1; fi
            VERSION="$BASE-$CHANNEL.$(date -u +%Y%m%d).$RUN_NUMBER"
          fi

          # This value later reaches MSBuild args, pwsh command lines and file names. Keeping it boring
          # (letters/digits/dot/plus/hyphen) is the backstop that also blocks a newline forging output.
          if ! printf '%s' "$VERSION" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9.+-]*$'; then
            echo "Refusing version '$VERSION': expected only letters, digits, dot, plus and hyphen" >&2
            exit 1
          fi

          {
            echo "ref=$REF"
            echo "tag=$TAG"
            echo "release_tag=$RELEASE_TAG"
            echo "channel=$CHANNEL"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"
          echo "Building $REF -> channel '$CHANNEL' (assets on '$RELEASE_TAG', manifest on '$TAG'), version $VERSION"

  build:
    name: ${{ matrix.name }}
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            rid: win-x64
            arch: x64
            package: windows
            publishArgs: "-p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true"
          - name: Windows ARM64
            os: windows-latest
            rid: win-arm64
            arch: arm64
            package: windows
            publishArgs: "-p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true"
          - name: Linux AppImage
            os: ubuntu-latest
            rid: linux-x64
            package: appimage
            publishArgs: ""
          - name: macOS Apple Silicon (DMG)
            os: macos-14
            rid: osx-arm64
            package: dmg
            publishArgs: ""

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve version
        id: version
        shell: bash
        # The version is decided once in `setup` (so build and release can't disagree). Re-validate it
        # here as a backstop before it reaches MSBuild args, pwsh command lines and file names.
        env:
          VERSION_IN: ${{ needs.setup.outputs.version }}
        run: |
          set -euo pipefail
          VERSION="$VERSION_IN"
          if ! printf '%s' "$VERSION" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9.+-]*$'; then
            echo "Refusing version '$VERSION': expected only letters, digits, dot, plus and hyphen" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/SqlExplorer.Desktop/SqlExplorer.Desktop.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:Version=${{ steps.version.outputs.value }} \
            ${{ matrix.publishArgs }} \
            -o publish/${{ matrix.rid }}

      # --- Packaging: one step per target type ---

      - name: Package (Windows zip)
        if: matrix.package == 'windows'
        shell: pwsh
        run: |
          $out = "artifacts"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Compress-Archive -Path "publish/${{ matrix.rid }}/*" `
            -DestinationPath "$out/LionearSqlExplorer-${{ steps.version.outputs.value }}-${{ matrix.rid }}.zip" -Force

      # Convenience installer next to the zip: Start-menu entry + uninstaller, per-user so it needs no
      # admin (matching where the Plugin Store already writes). Unsigned — SmartScreen warns on first run.
      - name: Package (Windows installer)
        if: matrix.package == 'windows'
        shell: pwsh
        # Version/arch/rid reach pwsh as env, not `${{ }}` spliced into the command line. Version is the
        # tainted one (it can trace back to inputs.version); the Resolve version step already whitelists
        # it, this keeps the sink from re-opening the hole.
        env:
          APP_VERSION: ${{ steps.version.outputs.value }}
          APP_ARCH: ${{ matrix.arch }}
          PUBLISH_RID: ${{ matrix.rid }}
        run: |
          # Pin the Inno Setup version so a build today and one last month use the same ISCC.
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup --version=6.7.1 --no-progress -y
          }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }

          & $iscc tools/windows-installer.iss `
            "/DAppVersion=$env:APP_VERSION" `
            "/DArch=$env:APP_ARCH" `
            "/DSourceDir=$(Resolve-Path "publish/$env:PUBLISH_RID")" `
            "/DOutputDir=$(Resolve-Path artifacts)"
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed with $LASTEXITCODE" }

      - name: Package (Linux AppImage)
        if: matrix.package == 'appimage'
        shell: bash
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"   # GitHub runners have no FUSE
          ARCH: x86_64                     # publish tree carries multiple arch signatures; pin the target
        run: |
          set -euo pipefail
          APPDIR=AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          cp -r publish/${{ matrix.rid }}/* "$APPDIR/usr/bin/"
          chmod +x "$APPDIR/usr/bin/SqlExplorer.Desktop"

          # Icon (top-level + hicolor path both referenced by the .desktop entry)
          cp src/SqlExplorer.App/Assets/icon.png "$APPDIR/lionear-sql-explorer.png"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          cp src/SqlExplorer.App/Assets/icon.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/lionear-sql-explorer.png"

          cat > "$APPDIR/lionear-sql-explorer.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=SQL Explorer
          Exec=SqlExplorer.Desktop
          Icon=lionear-sql-explorer
          Categories=Development;Database;
          Terminal=false
          EOF

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/SqlExplorer.Desktop" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          # appimagetool is the one external binary this pipeline runs, so it gets verified before it
          # runs, not just pinned. The tag is only a download location: AppImage re-uploads assets onto
          # existing tags (the "1.9.1" asset is itself a re-pushed continuous build), so a tag pin proves
          # nothing. The sha256 is the actual lock — bump it deliberately when you choose a new build.
          APPIMAGETOOL_URL="https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage"
          APPIMAGETOOL_SHA256="ed4ce84f0d9caff66f50bcca6ff6f35aae54ce8135408b3fa33abfc3cb384eb0"
          wget -q "$APPIMAGETOOL_URL" -O appimagetool
          echo "$APPIMAGETOOL_SHA256  appimagetool" | sha256sum -c -
          chmod +x appimagetool

          mkdir -p artifacts
          ./appimagetool "$APPDIR" "artifacts/LionearSqlExplorer-${{ steps.version.outputs.value }}-x86_64.AppImage"

      - name: Package (macOS DMG)
        if: matrix.package == 'dmg'
        shell: bash
        run: |
          set -euo pipefail
          # The Desktop project's CreateMacAppBundle target assembles the .app
          # from the publish output on macOS, one level above PublishDir.
          APP="publish/SQL Explorer.app"
          if [ ! -d "$APP" ]; then
            echo "Expected app bundle not found at: $APP" >&2
            ls -la publish >&2
            exit 1
          fi

          # Best-effort ad-hoc sign (identity "-", no Developer ID) so the bundle carries a
          # consistent signature. Non-fatal: `codesign --deep` is flaky, and the app runs
          # fine unsigned anyway — a downloaded copy just needs `xattr -cr` (see release
          # notes) because it is not notarized. Never let a signing hiccup fail the build.
          codesign --force --deep --sign - "$APP" \
            || echo "::warning::ad-hoc codesign failed; shipping unsigned bundle (needs xattr -cr on download)"
          codesign --verify --deep --strict --verbose=2 "$APP" \
            || echo "::warning::codesign verify reported issues (continuing)"

          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"   # drag-to-install UX

          mkdir -p artifacts
          DMG="artifacts/LionearSqlExplorer-${{ steps.version.outputs.value }}-osx-arm64.dmg"

          # hdiutil intermittently fails with "Resource busy" on CI: something (Spotlight indexing the
          # freshly copied staging dir is the usual suspect) still holds it when the image is built. The
          # step is otherwise deterministic, so retry rather than fail a whole build on a race.
          for attempt in 1 2 3; do
            if hdiutil create -volname "SQL Explorer" -srcfolder "$STAGE" -ov -format UDZO "$DMG"; then
              echo "DMG created on attempt $attempt"
              exit 0
            fi
            echo "::warning::hdiutil attempt $attempt failed; retrying in 10s"
            sleep 10
          done

          echo "hdiutil failed three times" >&2
          exit 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: artifacts/*
          retention-days: 14
          if-no-files-found: error

  # Publishes each channel's release plus its update.json manifest (the in-app updater's source of truth):
  #   Stable  : a real, latest, non-prerelease release on the v-tag (assets), and a rolling `stable`
  #             release carrying only update.json (links point at the v-tag assets).
  #   Preview : rolling prerelease `preview` with assets + update.json   (main)
  #   Nightly : rolling prerelease `nightly` with assets + update.json   (develop)
  # Download links are stable per channel:
  #   https://github.com/Lionear/SqlExplorer/releases/download/{stable|preview|nightly}/update.json
  # Runs on the scheduled build, on a push (branch or tag), or on a manual run with publish_release ticked.
  release:
    name: Publish ${{ needs.setup.outputs.channel }} release
    needs: [setup, build]
    if: ${{ github.event_name == 'schedule' || github.event_name == 'push' || inputs.publish_release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write   # open the changelog-roll sync PR back to develop (Stable only)
    steps:
      # Full history + tags so the changelog can diff against the previous v-tag.
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist   # each artifact lands in dist/<rid>/<file>

      - name: Publish release + update.json
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          CHANNEL: ${{ needs.setup.outputs.channel }}
          TAG: ${{ needs.setup.outputs.tag }}
          RELEASE_TAG: ${{ needs.setup.outputs.release_tag }}
          REF: ${{ needs.setup.outputs.ref }}
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          set -euo pipefail

          # One flat dir for the manifest scanner and the upload glob.
          mkdir -p assets
          find dist -type f -exec cp {} assets/ \;

          # Release notes are the maintainer-curated CHANGELOG.md [Unreleased] section (Keep a Changelog),
          # not the git log — the changelog is the source of truth for "what changed". An empty section
          # falls back to a neutral line so a release never ships blank notes. On a Stable build the
          # checked-out tree is the v-tag, whose [Unreleased] still holds the pending entries (they are
          # rolled into [VERSION] further down, after the release is published).
          # Fold the changelog fragments (changelog.d/, SE-185) into [Unreleased] first — that is where
          # the pending entries live between releases, so the notes below would otherwise be empty. It
          # edits the working tree only; the roll further down commits the result.
          python3 tools/changelog-render.py || true

          CHANGELOG=CHANGELOG.md tools/changelog-unreleased.sh > notes.md || true
          [ -s notes.md ] || echo "No changes recorded." > notes.md

          # HEAD_REF identifies the built commit for COMMIT/TARGET below: the tag for Stable, the branch
          # tip otherwise.
          if [ "$CHANNEL" = stable ]; then HEAD_REF="$RELEASE_TAG"; else HEAD_REF=HEAD; fi
          COMMIT=$(git rev-parse --short "$HEAD_REF")
          # gh's --target is a target_commitish: only a branch name or a commit SHA is valid, never a tag
          # name. On a Stable build REF is the v-tag (v0.2.0), so pass the resolved commit instead — a SHA
          # is valid for every channel (branch builds resolve HEAD to the branch tip we built).
          TARGET=$(git rev-parse "${HEAD_REF}^{commit}")
          PUBLISHED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          DOWNLOAD_BASE="https://github.com/$GH_REPO/releases/download/$RELEASE_TAG"

          CHANNEL="$CHANNEL" VERSION="$VERSION" COMMIT="$COMMIT" PUBLISHED_AT="$PUBLISHED_AT" \
            ASSET_DIR=assets DOWNLOAD_BASE="$DOWNLOAD_BASE" NOTES_FILE=notes.md OUT=update.json \
            tools/make-update-manifest.sh

          BODY="$(cat notes.md)

          These builds are unsigned / not notarized.
          macOS: after moving to /Applications, clear quarantine: xattr -cr \"/Applications/SQL Explorer.app\".
          Windows: pick the -setup.exe (per-user, no admin) or the .zip; SmartScreen may warn on first launch."

          if [ "$CHANNEL" = stable ]; then
            # Real latest release on the human-pushed v-tag (assets here). Delete only the release, never
            # the tag — the tag is what we checked out and what users cite.
            gh release delete "$RELEASE_TAG" --yes || true
            gh release create "$RELEASE_TAG" assets/* \
              --title "SQL Explorer $VERSION" --notes "$BODY" --latest --target "$TARGET"
            # Rolling `stable` pointer: only update.json, whose asset URLs point at the v-tag release above.
            gh release delete "$TAG" --yes --cleanup-tag || true
            gh release create "$TAG" update.json \
              --title "Stable channel manifest" \
              --notes "Update manifest for the Stable channel (points at the latest v-tag release)." \
              --latest=false --target "$TARGET"

            # Archive the notes we just shipped: roll CHANGELOG.md's [Unreleased] into [VERSION] on the
            # default branch and push it back. Only CHANGELOG.md changes, and *.md is in paths-ignore, so
            # this commit does not re-trigger a build. Best-effort — a protected branch or a push race
            # must never fail an already-published release; on failure the maintainer rolls it by hand.
            if git fetch origin main \
               && git checkout -B main origin/main \
               && python3 tools/changelog-render.py \
               && VERSION="$VERSION" DATE="$(date -u +%Y-%m-%d)" REPO="$GH_REPO" \
                    CHANGELOG=CHANGELOG.md tools/changelog-roll.sh \
               && ! git diff --quiet -- CHANGELOG.md changelog.d; then
              git config user.name  "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              # -A so the folded-in fragments are removed by the same commit that archives them.
              git add -A CHANGELOG.md changelog.d
              git commit -m "chore(release): roll changelog for $VERSION"
              if git push origin main; then
                ROLL_SHA=$(git rev-parse HEAD)
                # The roll only ran on main; develop still carries the shipped notes under [Unreleased]
                # (plus any next-version work merged since promotion). Cherry-pick the same commit onto
                # develop through a PR so the roll never drifts (the 0.3.0 gap that needed PR #44 by hand).
                # A PR, not a direct push: when develop has advanced the cherry-pick conflicts, and the PR
                # is where that gets resolved. Best-effort — never fail an already-published release.
                SYNC_BRANCH="chore/changelog-roll-$VERSION"
                if git fetch origin develop && git checkout -B "$SYNC_BRANCH" origin/develop; then
                  if git cherry-pick -x "$ROLL_SHA"; then
                    if git push -f origin "$SYNC_BRANCH"; then
                      gh pr create --base develop --head "$SYNC_BRANCH" \
                        --title "chore(release): sync $VERSION changelog roll to develop" \
                        --body "Automated after the $VERSION release: cherry-picks the changelog roll ($ROLL_SHA) so develop's history files the shipped notes under \`[$VERSION]\`. Merge to keep \`[Unreleased]\` clean." \
                        || echo "::warning::changelog sync PR create failed; open a develop<-main changelog PR by hand"
                    else
                      echo "::warning::changelog sync branch push failed; open a develop<-main changelog PR by hand"
                    fi
                  else
                    git cherry-pick --abort || true
                    echo "::warning::changelog roll conflicts on develop; open a develop<-main changelog PR and resolve [Unreleased] by hand"
                  fi
                else
                  echo "::warning::could not check out develop for changelog sync; open a develop<-main changelog PR by hand"
                fi
              else
                echo "::warning::changelog roll-back push failed; roll [Unreleased] into [$VERSION] in CHANGELOG.md manually"
              fi
            else
              echo "::warning::changelog roll-back skipped (nothing to roll or checkout failed); verify CHANGELOG.md"
            fi
          else
            if [ "$TAG" = nightly ]; then TITLE="Nightly build (develop)"; else TITLE="Preview build (main)"; fi
            # Recreate the rolling release so tag, date and notes track the latest build. Target the branch
            # we built: on a scheduled run GITHUB_SHA is main's head, but the artifacts came from develop.
            gh release delete "$TAG" --yes --cleanup-tag || true
            gh release create "$TAG" assets/* update.json \
              --title "$TITLE" --notes "$BODY" --prerelease --target "$TARGET"
          fi
