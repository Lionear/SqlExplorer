name: Build

# Runs nightly at 02:00 UTC and on manual dispatch. To pause the nightly build,
# comment out the `schedule` block below; `workflow_dispatch` keeps manual runs.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version stamp (leave empty for nightly-<date>-<run>)"
        required: false
        default: ""
      publish_release:
        description: "Also refresh the 'nightly' GitHub release with these builds"
        type: boolean
        required: false
        default: false
  schedule:
    - cron: "0 2 * * *"   # nightly at 02:00 UTC
  push:
    branches: [main]
    paths-ignore:      # docs / non-code changes shouldn't spend a full build
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
      - ".idea/**"
      - "**/*.DotSettings*"

# Superseded push builds cancel each other; scheduled/dispatch runs keep their own
# lane (event_name in the key) so a push never cancels a nightly or a manual run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            rid: win-x64
            package: windows
            publishArgs: "-p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true"
          - name: Windows ARM64
            os: windows-latest
            rid: win-arm64
            package: windows
            publishArgs: "-p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true"
          - name: Linux AppImage
            os: ubuntu-latest
            rid: linux-x64
            package: appimage
            publishArgs: ""
          - name: macOS Apple Silicon (DMG)
            os: macos-14
            rid: osx-arm64
            package: dmg
            publishArgs: ""

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="0.1.0-nightly.$(date -u +%Y%m%d).${{ github.run_number }}"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/SqlExplorer.Desktop/SqlExplorer.Desktop.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:Version=${{ steps.version.outputs.value }} \
            ${{ matrix.publishArgs }} \
            -o publish/${{ matrix.rid }}

      # --- Packaging: one step per target type ---

      - name: Package (Windows zip)
        if: matrix.package == 'windows'
        shell: pwsh
        run: |
          $out = "artifacts"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Compress-Archive -Path "publish/${{ matrix.rid }}/*" `
            -DestinationPath "$out/LionearSqlExplorer-${{ matrix.rid }}.zip" -Force

      - name: Package (Linux AppImage)
        if: matrix.package == 'appimage'
        shell: bash
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"   # GitHub runners have no FUSE
          ARCH: x86_64                     # publish tree carries multiple arch signatures; pin the target
        run: |
          set -euo pipefail
          APPDIR=AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          cp -r publish/${{ matrix.rid }}/* "$APPDIR/usr/bin/"
          chmod +x "$APPDIR/usr/bin/SqlExplorer.Desktop"

          # Icon (top-level + hicolor path both referenced by the .desktop entry)
          cp src/App/Assets/icon.png "$APPDIR/lionear-sql-explorer.png"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          cp src/App/Assets/icon.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/lionear-sql-explorer.png"

          cat > "$APPDIR/lionear-sql-explorer.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Lionear SQL Explorer
          Exec=SqlExplorer.Desktop
          Icon=lionear-sql-explorer
          Categories=Development;Database;
          Terminal=false
          EOF

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/SqlExplorer.Desktop" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          mkdir -p artifacts
          ./appimagetool "$APPDIR" "artifacts/LionearSqlExplorer-x86_64.AppImage"

      - name: Package (macOS DMG)
        if: matrix.package == 'dmg'
        shell: bash
        run: |
          set -euo pipefail
          # The Desktop project's CreateMacAppBundle target assembles the .app
          # from the publish output on macOS, one level above PublishDir.
          APP="publish/Lionear SQL Explorer.app"
          if [ ! -d "$APP" ]; then
            echo "Expected app bundle not found at: $APP" >&2
            ls -la publish >&2
            exit 1
          fi

          # Best-effort ad-hoc sign (identity "-", no Developer ID) so the bundle carries a
          # consistent signature. Non-fatal: `codesign --deep` is flaky, and the app runs
          # fine unsigned anyway — a downloaded copy just needs `xattr -cr` (see release
          # notes) because it is not notarized. Never let a signing hiccup fail the build.
          codesign --force --deep --sign - "$APP" \
            || echo "::warning::ad-hoc codesign failed; shipping unsigned bundle (needs xattr -cr on download)"
          codesign --verify --deep --strict --verbose=2 "$APP" \
            || echo "::warning::codesign verify reported issues (continuing)"

          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"   # drag-to-install UX

          mkdir -p artifacts
          hdiutil create \
            -volname "Lionear SQL Explorer" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            "artifacts/LionearSqlExplorer-osx-arm64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: artifacts/*
          retention-days: 14
          if-no-files-found: error

  # Publishes a rolling "nightly" prerelease with fixed asset download links:
  #   https://github.com/Lionear/SqlExplorer/releases/download/nightly/<file>
  # Runs on the scheduled nightly build, or on a manual run when publish_release is ticked.
  release:
    name: Nightly release
    needs: build
    if: ${{ github.event_name == 'schedule' || github.event_name == 'push' || inputs.publish_release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist   # each artifact lands in dist/<rid>/<file>

      - name: Publish/refresh nightly release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}   # gh has no checkout here; resolve the repo via API, not git
        run: |
          set -euo pipefail
          TAG=nightly
          NOTES="Automated nightly build from ${GITHUB_SHA:0:7} on $(date -u +'%Y-%m-%d %H:%M UTC').

          These builds are unsigned / not notarized.

          macOS: the app is ad-hoc signed but not notarized, so a downloaded copy is quarantined and macOS reports \"is damaged and can't be opened\". After moving it to /Applications, clear the quarantine flag, then open normally:
              xattr -cr \"/Applications/Lionear SQL Explorer.app\"

          Windows: SmartScreen may warn on first launch (More info -> Run anyway)."

          # Recreate the release so the tag, date and notes track the latest build.
          gh release delete "$TAG" --yes --cleanup-tag || true
          gh release create "$TAG" dist/*/* \
            --title "Nightly build" \
            --notes "$NOTES" \
            --prerelease \
            --target "$GITHUB_SHA"
