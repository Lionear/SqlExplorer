name: Tests

# Runs the unit tests on every PR and on pushes to the integration branches, so a regression is caught
# before it reaches a build. The Core suite stays light (Core + Sdk only, no Avalonia app); the
# Backends.Docker suite is heavier because it compiles against the plugin, which references Avalonia.
on:
  push:
    branches: [develop, main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".idea/**"
      - "**/*.DotSettings*"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".idea/**"
      - "**/*.DotSettings*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Test (Core)
        run: dotnet test tests/SqlExplorer.Core.Tests/SqlExplorer.Core.Tests.csproj -c Release

      # App view-model tests: references the App class library (Avalonia), constructs view-models only.
      - name: Test (App)
        run: dotnet test tests/SqlExplorer.App.Tests/SqlExplorer.App.Tests.csproj -c Release

      # The Docker backend plugin's unit tests (SE-164 migration): its own assembly, compiled directly against
      # the plugin (which references Avalonia), so this step is heavier than the Core-only one above.
      - name: Test (Backends.Docker)
        run: dotnet test tests/SqlExplorer.Backends.Docker.Tests/SqlExplorer.Backends.Docker.Tests.csproj -c Release
