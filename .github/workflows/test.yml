name: Tests

# Runs the unit tests on every PR and on pushes to the integration branches, so a regression is caught
# before it reaches a build. Deliberately light: the test project references only Core + Sdk, so this
# does not build the Avalonia app or the provider plugins.
on:
  push:
    branches: [develop, main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".idea/**"
      - "**/*.DotSettings*"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".idea/**"
      - "**/*.DotSettings*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Test
        run: dotnet test tests/SqlExplorer.Core.Tests/SqlExplorer.Core.Tests.csproj -c Release
